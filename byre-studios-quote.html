
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Byre Studios — Get a Quote</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1a1a1a;
    --fog:#8a8a8a;
    --line:#e7e7e7;
    --line-soft:#f0f0f0;
  }

  *{box-sizing:border-box;}

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.01ms !important; animation-iteration-count:1 !important; transition-duration:0.01ms !important;}
  }

  html, body{
    height:100%;
    margin:0;
  }
  body{
    background:#ffffff;
    color:var(--ink);
    font-family:'Inter', sans-serif;
    font-weight:400;
    -webkit-font-smoothing:antialiased;
    line-height:1.3;
  }

  .wrap{
    max-width:420px;
    margin:0 auto;
    padding:7px 14px 9px;
  }

  fieldset{
    border:none;
    padding:0;
    margin:0 0 5px;
  }
  legend{
    font-size:0.66rem;
    letter-spacing:0.04em;
    text-transform:uppercase;
    color:var(--fog);
    font-weight:500;
    margin-bottom:3px;
    padding:0;
  }

  .field-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(140px, 1fr));
    gap:3px 9px;
  }
  .field{margin-bottom:3px;}
  .field label{
    display:block;
    font-size:0.76rem;
    font-weight:500;
    color:var(--ink);
    margin-bottom:2px;
  }
  .field .hint{
    font-weight:400;
    color:var(--fog);
    font-size:0.72rem;
  }
  input[type="text"],
  input[type="email"],
  input[type="tel"],
  input[type="date"],
  input[type="time"],
  textarea,
  select{
    width:100%;
    font-family:'Inter', sans-serif;
    font-size:0.86rem;
    color:var(--ink);
    background:#fff;
    border:1px solid var(--line);
    border-radius:2px;
    padding:3px 6px;
  }
  textarea{
    resize:vertical;
    min-height:26px;
    line-height:1.3;
  }
  input:focus, select:focus, textarea:focus{
    outline:none;
    border-color:var(--ink);
  }

  .booking-row{
    display:flex;
    flex-direction:column;
    gap:5px;
  }
  .field-package{width:100%;}
  .field-duration{width:100%;}

  /* Shared segmented-control style */
  .segmented{
    display:flex;
    gap:4px;
    flex-wrap:nowrap;
  }
  .segmented label{
    display:block;
    flex:1;
    min-width:0;
    text-align:center;
    padding:3px 4px;
    border:1px solid var(--line);
    border-radius:6px;
    background:#fff;
    cursor:pointer;
    font-size:0.72rem;
    transition:border-color 0.15s, background 0.15s;
  }
  .segmented input{position:absolute; opacity:0; pointer-events:none;}
  .segmented input:checked + label{
    border-color:var(--ink);
    background:var(--line-soft);
  }
  .segmented .radio-wrap{position:relative; flex:1; min-width:0;}
  .segmented .radio-wrap.is-disabled{
    opacity:0.4;
    pointer-events:none;
  }
  .segmented .amt{display:block; color:var(--fog); font-size:0.66rem; margin-top:0;}

  .field-note{
    font-size:0.71rem;
    color:var(--fog);
    margin-top:3px;
  }

  .price-card{
    border:1px solid #b9d3e8;
    border-radius:10px;
    padding:6px 11px;
    width:100%;
    margin:2px auto 0;
    box-sizing:border-box;
  }
  .total-strip{
    display:flex;
    justify-content:flex-end;
    align-items:baseline;
    gap:7px;
    padding:0;
    margin:0 0 3px;
  }
  .total-strip .t-label{
    font-size:0.74rem;
    color:var(--fog);
    font-weight:500;
  }
  .total-strip .t-value{
    font-size:1.15rem;
    font-weight:600;
  }

  .submit-row{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:3px;
  }
  button.send{
    width:100%;
    font-family:'Inter', sans-serif;
    font-weight:500;
    font-size:0.84rem;
    color:#fff;
    background:var(--ink);
    border:none;
    padding:6px 18px;
    border-radius:6px;
    cursor:pointer;
    transition:opacity 0.15s;
  }
  button.send:hover{opacity:0.85;}
  button.send:disabled{opacity:0.6; cursor:default;}
  .submit-hint{
    font-size:0.73rem;
    color:var(--fog);
  }
  .form-status{
    font-size:0.78rem;
    margin:6px 0 0;
    display:none;
    text-align:center;
  }
  .form-status.is-visible{display:block;}
  .form-status.is-success{color:#2a7a3b;}
  .form-status.is-error{color:#b03a2e;}
</style>
</head>
<body>

<div class="wrap">

  <form id="quoteForm">

    <fieldset>
      <div class="field-grid">
        <div class="field">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" required>
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required>
        </div>
        <div class="field">
          <label for="phone">Phone <span class="hint">(optional)</span></label>
          <input type="tel" id="phone" name="phone">
        </div>
      </div>
    </fieldset>

    <fieldset>
      <legend>What you're booking</legend>
      <div class="booking-row">
        <div class="field field-package">
          <label for="package">Package</label>
          <select id="package" name="package">
            <option value="studio">Studio</option>
            <option value="darkroom">Darkroom</option>
            <option value="bundle">Studio + Darkroom bundle</option>
          </select>
        </div>

        <div class="field field-duration">
          <label>Duration</label>
          <div class="segmented" id="durationGroup">
            <div class="radio-wrap">
              <input type="radio" id="dur-1h" name="duration" value="1h" checked>
              <label for="dur-1h">1 hour</label>
            </div>
            <div class="radio-wrap">
              <input type="radio" id="dur-half" name="duration" value="half">
              <label for="dur-half">Half day</label>
            </div>
            <div class="radio-wrap">
              <input type="radio" id="dur-full" name="duration" value="full">
              <label for="dur-full">Full day</label>
            </div>
          </div>
        </div>
      </div>
    </fieldset>

    <fieldset>
      <legend>Studio assistant</legend>
      <div class="segmented" id="assistantGroup">
        <div class="radio-wrap">
          <input type="radio" id="assist-none" name="assistant" value="none" checked>
          <label for="assist-none">None</label>
        </div>
        <div class="radio-wrap">
          <input type="radio" id="assist-1h" name="assistant" value="1h" data-price="30">
          <label for="assist-1h">1 hour <span class="amt">+£30</span></label>
        </div>
        <div class="radio-wrap" id="assist3Row">
          <input type="radio" id="assist-3h" name="assistant" value="3h" data-price="80">
          <label for="assist-3h">3 hours <span class="amt">+£80</span></label>
        </div>
      </div>
    </fieldset>

    <fieldset>
      <legend>Date request</legend>
      <div class="field-grid">
        <div class="field">
          <label for="date">Preferred date</label>
          <input type="date" id="date" name="date">
        </div>
        <div class="field">
          <label for="time">Start time</label>
          <input type="time" id="time" name="time">
        </div>
      </div>
    </fieldset>

    <fieldset>
      <legend>Anything else we should know?</legend>
      <div class="field">
        <textarea id="notes" name="notes" rows="2" placeholder="Optional — shoot concept, group size, access needs, etc."></textarea>
      </div>
    </fieldset>

    <div class="price-card">
      <div class="total-strip">
        <span class="t-label">Estimated total</span>
        <span class="t-value">£<span id="totalAmount">40</span></span>
      </div>

      <div class="submit-row">
        <button type="submit" class="send" id="sendBtn">Send request</button>
        <p class="form-status" id="formStatus"></p>
      </div>
    </div>

  </form>

</div>

<script>
  const PRICES = {
    studio:   { '1h': 40, half: 120, full: 240 },
    darkroom: { '1h': 20, half: 80,  full: 140 },
    bundle:   { '1h': null, half: 150, full: 300 }
  };

  const packageEl = document.getElementById('package');
  const durationGroup = document.getElementById('durationGroup');
  const totalEl = document.getElementById('totalAmount');
  const form = document.getElementById('quoteForm');

  function getSelectedDuration(){
    const checked = durationGroup.querySelector('input[name="duration"]:checked');
    return checked ? checked.value : '1h';
  }

  const assist3Row = document.getElementById('assist3Row');
  const assist3Input = document.getElementById('assist-3h');
  const assistNoneInput = document.getElementById('assist-none');

  function updateAssist3Availability(){
    const dur = getSelectedDuration();
    if(dur === '1h'){
      assist3Row.classList.add('is-disabled');
      if(assist3Input.checked){
        assistNoneInput.checked = true;
      }
    } else {
      assist3Row.classList.remove('is-disabled');
    }
  }

  function calcTotal(){
    const pkg = packageEl.value;
    const dur = getSelectedDuration();
    let base = PRICES[pkg][dur];
    if(base === null){
      base = PRICES[pkg]['half'];
    }

    const assistantChecked = document.querySelector('input[name="assistant"]:checked');
    const addons = assistantChecked && assistantChecked.dataset.price
      ? parseFloat(assistantChecked.dataset.price)
      : 0;

    totalEl.textContent = (base + addons).toFixed(0);
  }

  packageEl.addEventListener('change', calcTotal);
  durationGroup.addEventListener('change', function(){
    updateAssist3Availability();
    calcTotal();
  });
  document.querySelectorAll('input[name="assistant"]').forEach(el => {
    el.addEventListener('change', calcTotal);
  });
  updateAssist3Availability();
  calcTotal();

  // ==========================================================
  // FORM SUBMISSION — sends a real email via Formspree instead
  // of relying on the visitor's device having an email app set up.
  // ==========================================================
  // Sign up free at https://formspree.io, verify your inbox, create a
  // form, and paste its endpoint URL below in place of the placeholder.
  const FORM_ENDPOINT = 'https://formspree.io/f/xbdndeek';

  const sendBtn = document.getElementById('sendBtn');
  const formStatus = document.getElementById('formStatus');

  function showStatus(text, kind){
    formStatus.textContent = text;
    formStatus.className = 'form-status is-visible is-' + kind;
  }

  form.addEventListener('submit', function(e){
    e.preventDefault();

    const data = new FormData(form);
    const pkgLabel = packageEl.options[packageEl.selectedIndex].text;
    const durMap = { '1h':'1 hour', half:'Half day', full:'Full day' };
    const assistantMap = { none: 'None', '1h': 'Studio assistant — 1 hour (+£30)', '3h': 'Studio assistant — 3 hours (+£80)' };
    const assistantValue = document.querySelector('input[name="assistant"]:checked').value;

    const lines = [
      `Name: ${data.get('name')}`,
      `Email: ${data.get('email')}`,
      `Phone: ${data.get('phone') || '-'}`,
      '',
      `Package: ${pkgLabel}`,
      `Duration: ${durMap[getSelectedDuration()]}`,
      `Add-ons: ${assistantMap[assistantValue]}`,
      '',
      `Preferred date: ${data.get('date') || '-'}`,
      `Preferred time: ${data.get('time') || '-'}`,
      '',
      `Notes: ${data.get('notes') || '-'}`,
      '',
      `Estimated total: £${totalEl.textContent}`
    ];

    const payload = new FormData();
    payload.append('name', data.get('name') || '');
    payload.append('email', data.get('email') || '');
    payload.append('message', lines.join('\n'));
    payload.append('_subject', `Booking quote request — ${data.get('name') || 'New enquiry'}`);

    sendBtn.disabled = true;
    sendBtn.textContent = 'Sending…';
    formStatus.className = 'form-status';

    fetch(FORM_ENDPOINT, {
      method: 'POST',
      body: payload,
      headers: { 'Accept': 'application/json' }
    })
    .then(response => {
      if(response.ok){
        showStatus("Thanks — your request has been sent. We'll be in touch shortly.", 'success');
        form.reset();
        packageEl.selectedIndex = 0;
        document.getElementById('dur-1h').checked = true;
        document.getElementById('assist-none').checked = true;
        updateAssist3Availability();
        calcTotal();
      } else {
        showStatus("Something went wrong sending that — please try again, or email us directly at contact@byrestudios.co.uk.", 'error');
      }
    })
    .catch(() => {
      showStatus("Something went wrong sending that — please try again, or email us directly at contact@byrestudios.co.uk.", 'error');
    })
    .finally(() => {
      sendBtn.disabled = false;
      sendBtn.textContent = 'Send request';
    });
  });
</script>

</body>
</html>
